apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-app
  namespace: {{ .Release.Namespace }}
  {{- if .Values.labels }}
  labels:
    {{- toYaml .Values.labels | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.deployment.replicas }} # ensure there is minimal downtime if node goes down
  selector:
    matchLabels:
      app: {{ .Release.Name }}-app
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-app
        {{- if .Values.labels }}
        {{- toYaml .Values.labels | nindent 8 }}
        {{- end }}
    spec:
    {{ if .Values.deployment.nodeSelector }}
      nodeSelector:
      {{- range $name,$value := .Values.deployment.nodeSelector }}
        {{$name}}: {{$value}}
      {{- end }}
    {{ end }}
      containers:
      - name: kube-watcher-api
        image: ghcr.io/kalavai-net/kube-watcher:{{ .Values.imageTag }}
        imagePullPolicy: "IfNotPresent"
        ports:
        - containerPort: 8000
        env:
        - name: IN_CLUSTER
          value: "{{ .Values.deployment.inCluster }}"
        - name: KALAVAI_USER_KEY
          value: "{{ .Values.deployment.kalavaiUsernameKey }}"
        - name: KW_USE_AUTH
          value: "{{ .Values.deployment.useAuthKey }}"
        - name: KW_ADMIN_KEY
          value: {{ .Values.deployment.adminKey }}
        - name: KW_WRITE_KEY
          value: {{ .Values.deployment.writeKey }}
        - name: KW_READ_ONLY_KEY
          value: {{ .Values.deployment.readonlyKey }}
        - name: IS_SHARED_POOL
          value: "{{ .Values.deployment.isSharedPool }}"
        {{- if .Values.deployment.staticWorkspace }}
        - name: STATIC_WORKSPACE
          value: "{{ .Values.deployment.staticWorkspace }}"
        {{- end }}
        - name: KALAVAI_API_ENDPOINT
          value: {{ .Values.deployment.kalavaiApiEndpoint }}
        - name: PROMETHEUS_ENDPOINT
          value: {{ .Values.deployment.prometheusEndpoint }}
        - name: OPENCOST_ENDPOINT
          value: {{ .Values.deployment.opencostEndpoint }}
        - name: LONGHORN_MANAGER_ENDPOINT
          value: {{ .Values.deployment.longhornManagerEndpoint }}
        livenessProbe:
          httpGet:
            path: /v1/health
            port: 8000
          initialDelaySeconds: 20
          periodSeconds: 30
        resources:
          requests:
            cpu: {{ .Values.resources.requests.cpus }}
            memory: {{ .Values.resources.requests.memory }}
          limits:
            cpu: {{ .Values.resources.limits.cpus }}
            memory: {{ .Values.resources.limits.memory }}
      serviceAccountName: {{ .Release.Name }}-service-account  # Service account with cluster permissions